name: Deploy ChurnIQ to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION:  ${{ secrets.AWS_REGION }}
  ECR_REPO:    ${{ secrets.ECR_REPOSITORY }}
  LAMBDA_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
  S3_BUCKET:   ${{ secrets.S3_BUCKET_NAME }}

jobs:
  deploy-backend:
    name: Build & Deploy Backend (Lambda + ECR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update Lambda function
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --image-uri     "$IMAGE_URI"
          aws lambda wait function-updated \
            --function-name "$LAMBDA_NAME"

  deploy-frontend:
    name: Deploy Frontend (S3)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync frontend files to S3
        run: |
          aws s3 sync ./static s3://$S3_BUCKET \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.DS_Store"
